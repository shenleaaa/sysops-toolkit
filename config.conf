#!/bin/bash
# ============================================================
# Linux 系统运维工具箱 — 全局配置文件
# ============================================================

# --- 告警阈值 ---
CPU_THRESHOLD=80          # CPU 使用率告警阈值 (%)
MEM_THRESHOLD=80          # 内存使用率告警阈值 (%)
DISK_THRESHOLD=90         # 磁盘使用率告警阈值 (%)
SWAP_THRESHOLD=50         # Swap 使用率告警阈值 (%)

# --- 文件扫描参数 ---
LARGE_FILE_SIZE="+100M"   # 大文件阈值 (find -size 参数)
OLD_FILE_MTIME="+30"      # 旧文件阈值 (find -mtime 参数, 天)

# --- 日志分析参数 ---
LOG_RETENTION_DAYS=7      # 日志保留天数
LOG_ARCHIVE_DIR="./logs/archive"  # 日志归档目录

# --- 暴力破解检测 ---
BRUTE_FORCE_WINDOW=300    # 检测窗口 (秒), 默认 5 分钟
BRUTE_FORCE_THRESHOLD=5   # 失败次数阈值

# --- 监控参数 ---
MONITOR_INTERVAL=2        # 监控刷新间隔 (秒)
TOP_N_PROCS=5             # 进程 Top N 数量

# --- 守护进程参数 ---
DAEMON_INTERVAL=300       # 守护进程巡检间隔 (秒), 默认 5 分钟

# --- 颜色开关 (true/false) ---
COLOR_OUTPUT=true

# --- 颜色定义 (ANSI) ---
if [[ "$COLOR_OUTPUT" == "true" ]]; then
    COLOR_RED=$'\033[0;31m'
    COLOR_GREEN=$'\033[0;32m'
    COLOR_YELLOW=$'\033[1;33m'
    COLOR_BLUE=$'\033[0;34m'
    COLOR_CYAN=$'\033[0;36m'
    COLOR_BOLD=$'\033[1m'
    COLOR_RESET=$'\033[0m'
    COLOR_BG_RED=$'\033[41m'
else
    COLOR_RED='' COLOR_GREEN='' COLOR_YELLOW='' COLOR_BLUE=''
    COLOR_CYAN='' COLOR_BOLD='' COLOR_RESET='' COLOR_BG_RED=''
fi

# --- 日志文件路径（工具自身日志） ---
LOG_DIR="./logs"
LOG_FILE="$LOG_DIR/sysops_$(date +%Y%m%d).log"

# --- 报告输出目录 ---
REPORT_DIR="./reports"

# --- 关键目录（安全扫描目标） ---
SECURITY_SCAN_DIRS=("/etc" "/bin" "/sbin" "/usr/bin" "/usr/sbin")

# --- PID 文件（守护进程模式） ---
PID_FILE="./logs/sysops_daemon.pid"
